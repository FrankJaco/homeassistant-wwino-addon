<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Inventory Scanner</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; background-color: #f8f9fa; }
        .container { max-width: 900px; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #343a40; }
        .btn-custom { margin: 5px; }
        .wine-card { border: 1px solid #e2e6ea; border-radius: 5px; margin-bottom: 15px; padding: 15px; background-color: #fefefe; }
        .wine-card h5 { color: #007bff; margin-bottom: 10px; }
        .form-control[disabled] { background-color: #e9ecef; }
        .btn[disabled] { pointer-events: none; opacity: 0.65; }
        .status-enabled { color: green; font-weight: bold; }
        .status-disabled { color: red; font-weight: bold; }
        .log-container { max-height: 300px; overflow-y: scroll; background-color: #e9ecef; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4 text-center">Wine Inventory Scanner</h1>

        <div class="card mb-4">
            <div class="card-header">
                HA Sync Control
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="mb-0">Home Assistant Sync Status: <span id="haSyncStatus" class="status-disabled">Loading...</span></p>
                    <button id="haSyncToggleBtn" class="btn btn-sm btn-primary">Toggle HA Sync</button>
                </div>
                <button id="syncAllWinesBtn" class="btn btn-info btn-block mb-2">Sync All Wines to HA To-Do</button>
                <button id="reinitializeDbBtn" class="btn btn-warning btn-block mb-2">Reinitialize Database (DANGER!)</button>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                Add New Wine
            </div>
            <div class="card-body">
                <form id="addWineForm" class="wine-control">
                    <div class="form-group">
                        <label for="wineUrl">Vivino URL:</label>
                        <input type="url" class="form-control" id="wineUrl" placeholder="Enter Vivino URL" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity:</label>
                        <input type="number" class="form-control" id="quantity" value="1" min="1" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Add Wine</button>
                </form>
            </div>
        </div>

        <h2 class="mb-3">Current Wine Inventory</h2>
        <div id="wineInventory" class="row">
            </div>

        <h2 class="mb-3">Application Logs</h2>
        <div id="logOutput" class="log-container">
            </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Function to fetch and update HA Sync status
        async function updateHaSyncStatus() {
            try {
                const response = await fetch('/api/ha-sync-status');
                const data = await response.json();
                const haSyncEnabled = data.ha_sync_enabled; // This is the crucial line

                console.log('HA Sync status for UI controls (global):', haSyncEnabled);

                const haSyncToggleBtn = document.getElementById('haSyncToggleBtn');
                const haSyncStatusSpan = document.getElementById('haSyncStatus');
                const wineControlElements = document.querySelectorAll('.wine-control');

                if (haSyncEnabled) {
                    haSyncStatusSpan.textContent = 'Enabled';
                    haSyncStatusSpan.classList.remove('status-disabled');
                    haSyncStatusSpan.classList.add('status-enabled');
                    haSyncToggleBtn.textContent = 'Disable HA Sync';
                    haSyncToggleBtn.classList.remove('btn-success');
                    haSyncToggleBtn.classList.add('btn-danger');
                    wineControlElements.forEach(el => el.removeAttribute('disabled'));
                } else {
                    haSyncStatusSpan.textContent = 'Disabled';
                    haSyncStatusSpan.classList.remove('status-enabled');
                    haSyncStatusSpan.classList.add('status-disabled');
                    haSyncToggleBtn.textContent = 'Enable HA Sync';
                    haSyncToggleBtn.classList.remove('btn-danger');
                    haSyncToggleBtn.classList.add('btn-success');
                    wineControlElements.forEach(el => el.setAttribute('disabled', 'true'));
                }
            } catch (error) {
                console.error('Error fetching HA sync status:', error);
                document.getElementById('haSyncStatus').textContent = 'Error';
            }
        }

        // Function to toggle HA Sync
        async function toggleHaSync() {
            try {
                // The backend handles the state change, so we just send a POST request
                const response = await fetch('/api/toggle-ha-sync', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (data.status === 'success' || data.message === 'HA sync status toggled successfully') {
                    console.log('HA Sync toggle successful, new status:', data.ha_sync_enabled);
                    updateHaSyncStatus(); // Refresh status after toggle
                } else {
                    console.error('HA Sync toggle failed:', data.message);
                }
            } catch (error) {
                console.error('Error toggling HA sync:', error);
            }
        }

        // Function to fetch and display wine inventory
        async function fetchWineInventory() {
            try {
                const response = await fetch('/inventory');
                const wines = await response.json();
                const inventoryDiv = document.getElementById('wineInventory');
                inventoryDiv.innerHTML = ''; // Clear current inventory

                if (wines.length === 0) {
                    inventoryDiv.innerHTML = '<div class="col-12"><p class="text-center">No wines in inventory. Add some above!</p></div>';
                    return;
                }

                wines.forEach(wine => {
                    const wineCard = `
                        <div class="col-md-6 col-lg-4">
                            <div class="wine-card">
                                <h5>${wine.name} (${wine.vintage})</h5>
                                <p><strong>Region:</strong> ${wine.region}</p>
                                <p><strong>Winery:</strong> ${wine.winery}</p>
                                <p><strong>Quantity:</strong> <span id="quantity-${wine.id}">${wine.quantity}</span></p>
                                <p><strong>Vivino Rating:</strong> ${wine.vivino_rating} (${wine.vivino_ratings_count} ratings)</p>
                                <p><strong>Vivino Link:</strong> <a href="${wine.vivino_link}" target="_blank">View on Vivino</a></p>
                                <div class="d-flex justify-content-around">
                                    <button class="btn btn-sm btn-success btn-custom consume-wine-btn wine-control" data-id="${wine.id}" data-name="${wine.name}">Consume</button>
                                    <button class="btn btn-sm btn-danger btn-custom remove-wine-btn wine-control" data-id="${wine.id}" data-name="${wine.name}">Remove</button>
                                </div>
                            </div>
                        </div>
                    `;
                    inventoryDiv.innerHTML += wineCard;
                });

                // Re-attach event listeners for dynamically added buttons
                document.querySelectorAll('.consume-wine-btn').forEach(button => {
                    button.onclick = (event) => consumeWine(event.target.dataset.id, event.target.dataset.name);
                });
                document.querySelectorAll('.remove-wine-btn').forEach(button => {
                    button.onclick = (event) => removeWine(event.target.dataset.id, event.target.dataset.name);
                });

                // After rendering, apply disabled state based on current HA Sync status
                updateHaSyncStatus(); // Ensure controls are correctly enabled/disabled
            } catch (error) {
                console.error('Error fetching wine inventory:', error);
                const inventoryDiv = document.getElementById('wineInventory');
                inventoryDiv.innerHTML = '<div class="col-12"><p class="text-center text-danger">Error loading inventory.</p></div>';
            }
        }

        // Function to add new wine
        document.getElementById('addWineForm').onsubmit = async function(event) {
            event.preventDefault();
            const wineUrl = document.getElementById('wineUrl').value;
            const quantity = document.getElementById('quantity').value;

            try {
                const response = await fetch('/add-wine', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vivino_url: wineUrl, quantity: parseInt(quantity) })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert('Wine added successfully!');
                    document.getElementById('wineUrl').value = ''; // Clear form
                    document.getElementById('quantity').value = '1';
                    fetchWineInventory(); // Refresh inventory
                } else {
                    alert('Error adding wine: ' + result.message);
                    console.error('Error adding wine:', result.message);
                }
            } catch (error) {
                console.error('Network or server error adding wine:', error);
                alert('An unexpected error occurred while adding wine.');
            }
        };

        // Function to consume a wine
        async function consumeWine(wineId, wineName) {
            if (!confirm(`Are you sure you want to consume one bottle of ${wineName}?`)) {
                return;
            }
            try {
                const response = await fetch(`/consume-wine/${wineId}`, {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert(`${wineName} consumed! Remaining: ${result.new_quantity}`);
                    fetchWineInventory(); // Refresh inventory
                } else {
                    alert('Error consuming wine: ' + result.message);
                    console.error('Error consuming wine:', result.message);
                }
            } catch (error) {
                console.error('Network or server error consuming wine:', error);
                alert('An unexpected error occurred while consuming wine.');
            }
        }

        // Function to remove a wine
        async function removeWine(wineId, wineName) {
            if (!confirm(`Are you sure you want to remove ALL bottles of ${wineName} from inventory?`)) {
                return;
            }
            try {
                const response = await fetch(`/remove-wine/${wineId}`, {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert(`${wineName} removed from inventory.`);
                    fetchWineInventory(); // Refresh inventory
                } else {
                    alert('Error removing wine: ' + result.message);
                    console.error('Error removing wine:', result.message);
                }
            } catch (error) {
                console.error('Network or server error removing wine:', error);
                alert('An unexpected error occurred while removing wine.');
            }
        }

        // Function to sync all wines to Home Assistant To-Do list
        document.getElementById('syncAllWinesBtn').onclick = async function() {
            if (!confirm('This will synchronize all wines in your database to the Home Assistant To-Do list. Existing matching items will be updated/removed and re-added. Do you want to proceed?')) {
                return;
            }
            try {
                const response = await fetch('/sync-all-wines', {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert(result.message);
                } else {
                    alert('Error syncing wines: ' + result.message);
                    console.error('Error syncing wines:', result.message);
                }
            } catch (error) {
                console.error('Network or server error syncing wines:', error);
                alert('An unexpected error occurred while syncing wines to HA.');
            }
        };

        // Function to reinitialize database
        document.getElementById('reinitializeDbBtn').onclick = async function() {
            if (!confirm('WARNING: This will DELETE ALL WINE DATA from your inventory and reinitialize the database! This action cannot be undone. Are you absolutely sure you want to proceed?')) {
                return;
            }
            try {
                const response = await fetch('/reinitialize-database-action', {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.status === 'success') {
                    alert(result.message);
                    fetchWineInventory(); // Clear and refresh inventory after reinit
                } else {
                    alert('Error reinitializing database: ' + result.message);
                    console.error('Error reinitializing database:', result.message);
                }
            } catch (error) {
                console.error('Network or server error reinitializing database:', error);
                alert('An unexpected error occurred during database reinitialization.');
            }
        };


        // Function to fetch and display logs
        async function fetchLogs() {
            try {
                const response = await fetch('/logs');
                const logs = await response.text(); // Logs are plain text
                const logOutputDiv = document.getElementById('logOutput');
                logOutputDiv.textContent = logs; // Use textContent to prevent HTML injection
                logOutputDiv.scrollTop = logOutputDiv.scrollHeight; // Scroll to bottom
            } catch (error) {
                console.error('Error fetching logs:', error);
                document.getElementById('logOutput').textContent = 'Error loading logs.';
            }
        }


        // Event Listeners
        document.getElementById('haSyncToggleBtn').addEventListener('click', toggleHaSync);

        // Initial calls when page loads
        document.addEventListener('DOMContentLoaded', () => {
            updateHaSyncStatus(); // Fetch status on load to set initial UI state
            fetchWineInventory(); // Populate inventory
            fetchLogs(); // Display initial logs
            setInterval(fetchLogs, 5000); // Refresh logs every 5 seconds
        });
    </script>
</body>
</html>
