<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonderful-Wino Inventory</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom styles to ensure Inter font is applied universally and for basic body reset */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f8f5ed; /* A light, warm background color for the whole page */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8">

    <!-- Header Section -->
    <header class="text-center mb-8 px-4 w-full max-w-4xl">
        <h1 class="text-4xl font-extrabold text-purple-800 tracking-tight">Wonderful-Wino Inventory</h1>
        <p class="text-lg text-gray-600 mt-2">Manage your wine collection with ease!</p>
    </header>

    <!-- Vivino Wine Search Section -->
    <section class="bg-white p-6 sm:p-8 rounded-xl shadow-lg border border-gray-200 w-full max-w-2xl mx-auto mb-8">
        <h2 class="text-2xl font-semibold text-purple-700 mb-4 text-center">Search Vivino for Wine</h2>
        <form id="vivinoSearchForm" class="flex flex-col sm:flex-row items-center justify-center space-y-4 sm:space-y-0 sm:space-x-4">
            <input
                type="text"
                id="vivinoSearchInput"
                name="q"
                placeholder="e.g., Cabernet Sauvignon, Pinot Noir 2018"
                class="flex-grow w-full sm:w-auto p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-700"
            >
            <button
                type="submit"
                class="w-full sm:w-auto px-6 py-3 bg-purple-700 text-white font-medium rounded-lg shadow-md hover:bg-purple-800 transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2"
            >
                Search Vivino
            </button>
        </form>
        <p class="text-center text-gray-500 text-sm mt-4">Your search results will open directly on Vivino.com.</p>
    </section>

    <!-- Original Root div for your React application -->
    <div id="root" class="w-full max-w-4xl px-4">
        <!-- Your React App.js will be bundled and loaded here -->
        <!-- This div is where your "Vivino URL" text field and "Scan Wine" button would be,
             as rendered by your React application. -->
    </div>

    <script>
        // Get the search form and input elements
        const vivinoSearchForm = document.getElementById('vivinoSearchForm');
        const vivinoSearchInput = document.getElementById('vivinoSearchInput');

        // Add an event listener for the form submission
        vivinoSearchForm.addEventListener('submit', function(event) {
            // Prevent the default form submission (which would open in the current webview)
            event.preventDefault();

            // Get the search query from the input field
            const query = vivinoSearchInput.value;

            // Construct the Vivino search URL
            const vivinoUrl = `https://www.vivino.com/search/wines?q=${encodeURIComponent(query)}`;

            // Attempt to open the URL in a new browser window/tab.
            // In a mobile webview environment, this often results in the OS opening
            // an external browser or prompting the user, rather than deep-linking
            // to a native app, especially if "_blank" is interpreted as "new window".
            window.open(vivinoUrl, '_blank');
        });
    </script>

</body>
</html>
