<!-- This file adds your custom CSS to the default theme's head -->
{%- if site.google_analytics -%}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
</script>
{%- endif -%}

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Begin Jekyll SEO tag v2.8.0 -->
<title>{{ page.title | default: site.title | escape }}</title>
<meta name="generator" content="Jekyll v3.9.5" />
<meta property="og:title" content="{{ page.title | default: site.title | escape }}" />
<meta property="og:locale" content="en_US" />
<meta name="description"
    content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />
<meta property="og:description"
    content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />
<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}" />
<meta property="og:url" content="{{ page.url | replace:'index.html','' | absolute_url }}" />
<meta property="og:site_name" content="{{ site.title | escape }}" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<meta property="twitter:title" content="{{ page.title | default: site.title | escape }}" />
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","description":"{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}","headline":"{{ page.title | default: site.title | escape }}","name":"{{ site.title | escape }}","url":"{{ page.url | replace:'index.html','' | absolute_url }}"}</script>
<!-- End Jekyll SEO tag -->

<!-- This loads the default primer theme styles FIRST -->
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

<!-- This is the new line that links your custom stylesheet -->
<!-- By loading it AFTER the default, your styles will override the theme's -->
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
