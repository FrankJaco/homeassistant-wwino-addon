<div id="notesModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="notesModalTitle">
    <div class="modal-content">
        <button class="modal-close-button" onclick="closeModal()">&times;</button>
        <h3 id="notesModalTitle" class="text-xl font-semibold mb-2">Tasting Notes & Image</h3>
        <p id="notesModalWineName" class="mb-4 text-gray-700"></p>

        <!-- The form wraps everything that needs to be saved -->
        <form id="notesForm">
            <input type="hidden" id="notesVivinoUrl">
            <!-- New: Hidden fields to store current image transformation state -->
            <input type="hidden" id="focalPointX" name="focal_point_x" value="50">
            <input type="hidden" id="focalPointY" name="focal_point_y" value="50">

            <!-- TASTING NOTES (MOVED TO TOP) -->
            <div class="mb-4">
                <label for="tastingNotesInput" class="block text-sm font-medium mb-1">Tasting Notes</label>
                <textarea id="tastingNotesInput" rows="5" placeholder="Enter your notes here..."
                    class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
            </div>

            <!-- MESSAGE AND BUTTONS (MOVED UP) -->
            <!-- These are still inside the form, so the "Save" button will submit it -->
            <div id="notesMessage" class="mt-4 text-center hidden"></div>
            <div class="mt-6 flex justify-end gap-4">
                <button type="button" onclick="closeModal()" class="button secondary">Cancel</button>
                <button type="submit" id="saveNotesBtn" class="button primary">Save</button>
            </div>

            <!-- IMAGE CONTROLS -->
            <div id="imageControls" class="mt-6">
                <h4 class="text-lg font-medium text-gray-800 mb-2">Image Focus</h4>
                <p class="text-sm text-gray-600 mb-4">Drag the image to set the focal point. Use the zoom slider to
                    adjust.</p>

                <!-- IMAGE DISPLAY AREA (FOCAL POINT EDITOR) -->
                <div class="mb-4">
                    <div id="focalPointEditor" class="overflow-hidden border rounded-md">
                        <img id="draggableImage" src="" alt="Wine bottle image" draggable="false"
                            class="w-full transition-transform duration-100 ease-linear">
                    </div>
                </div>

                <!-- ZOOM SLIDER SECTION -->
                <div id="zoomSliderContainer" class="transition-opacity duration-300">
                    <label for="zoomSlider" class="block text-sm font-medium mb-1">Zoom</label>
                    <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1"
                        class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700"
                        disabled>
                </div>

            </div>
            <!-- END IMAGE CONTROLS -->

        </form>
        <!-- FORM ENDS HERE -->

        <hr class="my-6 border-gray-300">
        <div>
            <div class="flex justify-between items-center mb-3">
                <h4 class="text-lg font-medium text-gray-800">Consumption Log</h4>
                <button id="logSortToggleBtn" title="Reverse Sort Order" class="icon-button text-xl">↕️</button>
            </div>
            <div id="consumptionLogContainer"
                class="text-sm text-gray-700 space-y-2 max-h-48 overflow-y-auto p-2 border rounded-md bg-gray-50">
                <p class="text-center text-gray-500">Loading history...</p>
            </div>
        </div>
    </div>
</div>
