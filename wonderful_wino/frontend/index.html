<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonderful-Wino Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Define CSS Variables for themes */
        :root {
            --bg-color: #f8f5ed;
            --text-color: #333;
            --header-color: #4a0e4e;
            --accent-color: #6b21a8;
            --card-bg: white;
            --border-color: #e5e7eb;
            --button-primary-bg: #8b5cf6; /* A purple tone for primary buttons */
            --button-primary-hover-bg: #7c3aed;
            --button-secondary-bg: #e5e7eb;
            --button-secondary-text: #4b5563;
            --button-secondary-hover-bg: #d1d5db;
            --table-header-bg: #f9fafb;
            --table-border-color: #e5e7eb;
            --input-bg: var(--card-bg); /* Input background defaults to card background */
            --input-text: var(--text-color); /* Input text defaults to main text color */
            --input-border: var(--border-color); /* Input border defaults to main border color */
        }

        /* Dark Theme Variables */
        .dark-theme {
            --bg-color: #2d3748; /* Dark background */
            --text-color: #e2e8f0; /* Light text */
            --header-color: #b794f4; /* Lighter purple for headers */
            --accent-color: #9f7aea; /* Another lighter purple for accents */
            --card-bg: #4a5568; /* Darker card background */
            --border-color: #6b7280;
            --button-primary-bg: #9f7aea;
            --button-primary-hover-bg: #b794f4;
            --button-secondary-bg: #6b7280;
            --button-secondary-text: #e2e8f0;
            --button-secondary-hover-bg: #718096;
            --table-header-bg: #4a5568;
            --table-border-color: #6b7280; /* Adjusted for better visibility in dark mode */
            --input-bg: #2d3748; /* Darker input background for contrast */
            --input-text: #e2e8f0; /* Light text for inputs */
            --input-border: #6b7280; /* Consistent border for inputs */
        }

        /* Custom styles to ensure Inter font is applied universally and for basic body reset */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-color); /* Use CSS variable */
            color: var(--text-color); /* Use CSS variable */
            transition: background-color 0.3s ease, color 0.3s ease; /* Smooth transition */
        }
        /* Style for wine details in the table */
        .wine-details-cell h4 {
            font-weight: 600; /* Semi-bold for wine name */
            margin-bottom: 0.25rem;
            color: var(--header-color); /* Use CSS variable */
        }
        .wine-details-cell p {
            margin-top: 0.25rem;
            margin-bottom: 0.25rem;
            line-height: 1.3;
            color: var(--text-color); /* Use CSS variable */
        }
        .wine-details-cell strong {
            font-weight: 700; /* Bold for important text */
            color: var(--accent-color); /* Use CSS variable */
        }

        /* Apply theme variables to other elements */
        .bg-white {
            background-color: var(--card-bg) !important; /* Override Tailwind's bg-white */
            transition: background-color 0.3s ease;
        }
        .text-purple-800 {
            color: var(--header-color) !important;
        }
        .text-gray-800 {
            color: var(--text-color) !important;
        }
        .text-gray-700 {
            color: var(--text-color) !important;
        }
        .border-gray-300 {
            border-color: var(--border-color) !important;
        }
        .focus\:ring-purple-500:focus {
            --tw-ring-color: var(--accent-color) !important;
        }
        .bg-purple-600 {
            background-color: var(--button-primary-bg) !important;
        }
        .hover\:bg-purple-700:hover {
            background-color: var(--button-primary-hover-bg) !important;
        }
        .bg-gray-200 {
            background-color: var(--button-secondary-bg) !important;
        }
        .hover\:bg-gray-300:hover {
            background-color: var(--button-secondary-hover-bg) !important;
        }
        .text-gray-600 {
            color: var(--button-secondary-text) !important;
        }
        .bg-gray-50 {
            background-color: var(--table-header-bg) !important;
        }
        .divide-gray-200 > :not([hidden]) ~ :not([hidden]) {
            border-color: var(--table-border-color) !important;
        }
        /* Explicitly set border-gray-200 to use table-border-color */
        .border-gray-200 {
            border-color: var(--table-border-color) !important;
        }
        .text-gray-500 {
            color: var(--text-color) !important; /* Adjust for general text within tables/messages */
        }
        .modal-content {
            background-color: var(--card-bg);
            color: var(--text-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 90%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            transition: background-color 0.3s ease, color 0.3s ease;
            padding: 1.5rem;
            border-radius: 0.5rem;
        }

        /* Modal specific styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-close-button {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
        }
        .modal-close-button:hover {
            color: var(--accent-color);
        }
        /* Style for the sort icon */
        .sort-icon {
            display: inline-block;
            vertical-align: middle;
            fill: currentColor;
        }
        /* Specific adjustments for buttons that use fixed colors for semantic meaning (red/green/blue) */
        .bg-red-600 { background-color: #dc2626 !important; }
        .hover\:bg-red-700:hover { background-color: #b91c1c !important; }
        .bg-green-600 { background-color: #16a34a !important; }
        .hover\:bg-green-700:hover { background-color: #15803d !important; }
        .text-green-600 { color: #16a34a !important; }
        .hover\:text-green-900:hover { color: #14532d !important; }
        .text-red-600 { color: #dc2626 !important; }
        .hover\:text-red-900:hover { color: #7f1d1d !important; }
        .bg-blue-600 { background-color: #2563eb !important; }
        .hover\:bg-blue-700:hover { background-color: #1d4ed8 !important; }
        .text-blue-600 { color: #2563eb !important; }

        /* Styles for the theme toggle button */
        #themeToggle {
            background-color: var(--button-secondary-bg);
            color: var(--button-secondary-text);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px; /* Pill shape */
            cursor: pointer;
            font-size: 0.875rem; /* text-sm */
            font-weight: 500; /* font-medium */
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        #themeToggle:hover {
            background-color: var(--button-secondary-hover-bg);
        }

        /* --- Fixes for Dark Mode Visibility --- */
        /* Apply theme colors to specific input and select elements */
        input[type="text"],
        input[type="number"],
        select {
            background-color: var(--input-bg) !important;
            color: var(--input-text) !important;
            border-color: var(--input-border) !important;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* Specific style for the sort direction toggle button */
        #sortDirectionToggle {
            background-color: var(--button-secondary-bg) !important;
            color: var(--button-secondary-text) !important;
            border-color: var(--border-color) !important; /* Ensure border also changes */
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        #sortDirectionToggle:hover {
            background-color: var(--button-secondary-hover-bg) !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8">

    <header class="text-center mb-8 px-4 w-full max-w-4xl flex justify-between items-center">
        <h1 class="text-4xl font-extrabold text-purple-800 tracking-tight">Wonderful Wino</h1>
        <button id="themeToggle" class="flex items-center space-x-2 px-3 py-2 rounded-full shadow-sm text-sm">
            <span id="themeIcon">☀️</span>
            <span id="themeText">Light Mode</span>
        </button>
    </header>

    <main class="w-full max-w-4xl px-4">
        <section class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4">Add Wine to Inventory</h2>

            <div class="mb-6">
                <p class="text-gray-700 mb-2 font-medium">Add via Vivino URL</p>
                <p class="text-gray-700 mb-2 text-sm">First, search Vivino to find your wine's page. Remember to include the vintage!</p>
                <form id="vivinoSearchForm" class="flex flex-col sm:flex-row gap-4 mb-4">
                    <input type="text" id="vivinoSearchInput" placeholder="e.g., 'Chateau Lafite 2010'"
                           class="flex-grow px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <button type="submit"
                            class="bg-purple-600 text-white px-6 py-2 rounded-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        Search Vivino
                    </button>
                </form>

                <p class="text-gray-700 mb-2 text-sm">Once you find the wine on Vivino, paste its URL below to add it:</p>
                <form id="scanWineForm" class="flex flex-col sm:flex-row gap-4 items-center">
                    <input type="text" id="vivinoUrlInput" placeholder="Paste Vivino URL here"
                           class="flex-grow px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500" required>
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <label for="quantityInput" class="text-gray-700 font-medium whitespace-nowrap">Qty:</label>
                        <input type="number" id="quantityInput" placeholder="1" min="1" value="1" class="w-20 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
                    </div>
                    <button type="submit"
                            class="bg-purple-600 text-white px-6 py-2 rounded-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        Add from URL
                    </button>
                </form>
                <div id="scanMessage" class="mt-4 text-center hidden"></div>
            </div>

            <div class="mt-6 pt-6 border-t border-gray-200 text-center">
                <button id="openManualAddModalBtn" class="bg-gray-200 text-gray-600 font-semibold px-6 py-2 rounded-md hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400">
                    Manual Entry
                </button>
            </div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md mb-8">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 sm:mb-4">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4 sm:mb-0">Wine on-hand</h2>
                <div class="flex items-center gap-2">
                    <select id="sortSelect" class="px-2 py-1 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm w-32">
                        <option value="name">Name</option>
                        <option value="varietal">Varietal</option>
                        <option value="country">Country</option>
                        <option value="region">Region</option>
                        <option value="vintage">Vintage</option>
                        <option value="rating">Rating</option>
                        <option value="quantity">Quantity</option>
                    </select>
                    <button id="sortDirectionToggle" class="px-2 py-1 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400" aria-label="Toggle sort direction">
                        <svg id="sortAscIcon" class="w-5 h-5 sort-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path>
                        </svg>
                        <svg id="sortDescIcon" class="w-5 h-5 sort-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="wineTableContainer" class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 rounded-lg shadow-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Wine
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Quantity
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody id="wineTableBody" class="bg-white divide-y divide-gray-200">
                        </tbody>
                </table>
                <div id="loadingIndicator" class="text-center py-4 text-gray-500 hidden">Loading...</div>
                <div id="errorIndicator" class="text-center py-4 text-red-600 font-medium hidden"></div>
                <div id="emptyListMessage" class="text-center py-4 text-gray-500">Your inventory is empty.</div>
            </div>
        </section>
    </main>

    <div id="manualAddModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="closeManualAddModalBtn" class="modal-close-button">&times;</button>
            <h3 class="text-2xl font-bold mb-4 text-purple-800">Manually Add Wine</h3>
            <form id="manualAddForm" class="space-y-4">
                <div>
                    <label for="manualNameInput" class="block text-sm font-medium text-gray-700">Wine Name</label>
                    <input type="text" id="manualNameInput" name="name" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div>
                    <label for="manualVarietalInput" class="block text-sm font-medium text-gray-700">Varietal (e.g., Cabernet Sauvignon)</label>
                    <input type="text" id="manualVarietalInput" name="varietal"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div>
                    <label for="manualVintageInput" class="block text-sm font-medium text-gray-700">Vintage (Year)</label>
                    <input type="number" id="manualVintageInput" name="vintage" min="1900" max="2100"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div>
                    <label for="manualRegionInput" class="block text-sm font-medium text-gray-700">Region</label>
                    <input type="text" id="manualRegionInput" name="region"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div>
                    <label for="manualCountryInput" class="block text-sm font-medium text-gray-700">Country</label>
                    <input type="text" id="manualCountryInput" name="country"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div>
                    <label for="manualQuantityInput" class="block text-sm font-medium text-gray-700">Quantity</label>
                    <input type="number" id="manualQuantityInput" name="quantity" min="1" value="1" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                </div>
                <div id="manualAddMessage" class="mt-4 text-center"></div>
                <div class="flex justify-end gap-2">
                    <button type="button" id="manualCancelBtn"
                            class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300">
                        Cancel
                    </button>
                    <button type="submit"
                            class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700">
                        Add Wine
                    </button>
                </div>
            </form>
        </div>
    </div>


    <script>
        // Use a flag to track if the data is being fetched
        let isFetching = false;
        let wineData = [];
        let sortColumn = 'name';
        let sortDirection = 'asc';

        // Get the current theme from localStorage or default to 'light'
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.body.classList.add(currentTheme + '-theme');

        // Initial update of the theme toggle button based on the current theme
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        if (currentTheme === 'dark') {
            themeIcon.textContent = '🌙';
            themeText.textContent = 'Dark Mode';
        } else {
            themeIcon.textContent = '☀️';
            themeText.textContent = 'Light Mode';
        }


        // Function to fetch the wine data from the backend
        async function fetchWineData() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('emptyListMessage').classList.add('hidden');
            document.getElementById('errorIndicator').classList.add('hidden');
            const tableBody = document.getElementById('wineTableBody');
            tableBody.innerHTML = ''; // Clear the table

            try {
                const response = await fetch('/api/wines');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                wineData = data.wines;
                renderWineTable();
            } catch (error) {
                console.error("Failed to fetch wine data:", error);
                document.getElementById('errorIndicator').textContent = 'Error loading wine data. Please check the addon logs.';
                document.getElementById('errorIndicator').classList.remove('hidden');
            } finally {
                document.getElementById('loadingIndicator').classList.add('hidden');
                isFetching = false;
            }
        }

        // Function to render the wine table
        function renderWineTable() {
            const tableBody = document.getElementById('wineTableBody');
            tableBody.innerHTML = ''; // Clear the table before re-rendering
            const sortedData = sortWineData(wineData);

            if (sortedData.length === 0) {
                document.getElementById('emptyListMessage').classList.remove('hidden');
            } else {
                document.getElementById('emptyListMessage').classList.add('hidden');
                sortedData.forEach(wine => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap wine-details-cell">
                            <h4>${wine.name} (${wine.vintage || 'n/a'})</h4>
                            <p><strong>Varietal:</strong> ${wine.varietal || 'n/a'}</p>
                            <p><strong>Region:</strong> ${wine.region || 'n/a'}, <strong>Country:</strong> ${wine.country || 'n/a'}</p>
                            ${wine.vivino_rating ? `<p><strong>Vivino Rating:</strong> ${wine.vivino_rating.toFixed(1)} ⭐ (${wine.vivino_num_ratings})</p>` : ''}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${wine.quantity}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="decrementQuantity(${wine.id})" class="text-red-600 hover:text-red-900 mx-2" title="Drink/Decrement Quantity">-</button>
                            <button onclick="incrementQuantity(${wine.id})" class="text-green-600 hover:text-green-900 mx-2" title="Add to Quantity">+</button>
                            <button onclick="deleteWine(${wine.id})" class="text-blue-600 hover:text-blue-900 mx-2" title="Delete Wine Permanently">🗑️</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // Function to sort the wine data
        function sortWineData(data) {
            return [...data].sort((a, b) => {
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];

                // Special handling for number columns that might be null
                if (sortColumn === 'vintage' || sortColumn === 'rating' || sortColumn === 'quantity') {
                    aVal = aVal === null ? (sortDirection === 'asc' ? -Infinity : Infinity) : aVal;
                    bVal = bVal === null ? (sortDirection === 'asc' ? -Infinity : Infinity) : bVal;
                }
                
                // Handle text comparisons
                if (typeof aVal === 'string' && typeof bVal === 'string') {
                    const comparison = aVal.localeCompare(bVal, undefined, {sensitivity: 'base'});
                    return sortDirection === 'asc' ? comparison : -comparison;
                }

                // Handle number comparisons
                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        // Function to handle the sort select change
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            sortColumn = e.target.value;
            renderWineTable();
        });

        // Function to handle the sort direction toggle
        document.getElementById('sortDirectionToggle').addEventListener('click', () => {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            document.getElementById('sortAscIcon').classList.toggle('hidden', sortDirection === 'desc');
            document.getElementById('sortDescIcon').classList.toggle('hidden', sortDirection === 'asc');
            renderWineTable();
        });

        // Function to handle the theme toggle
        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark-theme')) {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Light Mode';
            } else {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Dark Mode';
            }
        });


        // --- Vivino URL Logic ---
        const scanWineForm = document.getElementById('scanWineForm');
        const vivinoUrlInput = document.getElementById('vivinoUrlInput');
        const quantityInput = document.getElementById('quantityInput');
        const scanMessage = document.getElementById('scanMessage');

        scanWineForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const vivinoUrl = vivinoUrlInput.value;
            const quantity = quantityInput.value;

            // Simple URL validation
            if (!vivinoUrl.startsWith('https://www.vivino.com/')) {
                scanMessage.textContent = 'Please enter a valid Vivino URL.';
                scanMessage.className = 'mt-4 text-center text-red-600 font-medium';
                scanMessage.classList.remove('hidden');
                return;
            }

            // Clear previous messages
            scanMessage.textContent = '';
            scanMessage.className = 'mt-4 text-center text-gray-500';
            scanMessage.textContent = 'Adding wine from Vivino, please wait...';
            scanMessage.classList.remove('hidden');

            try {
                const response = await fetch('/api/add_wine_vivino', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ vivino_url: vivinoUrl, quantity: quantity }),
                });

                const data = await response.json();

                if (response.ok) {
                    scanMessage.textContent = data.message;
                    scanMessage.className = 'mt-4 text-center text-green-600 font-medium';
                    fetchWineData(); // Refresh the table
                } else {
                    throw new Error(data.error || 'An unknown error occurred.');
                }
            } catch (error) {
                console.error('Error adding wine from Vivino:', error);
                scanMessage.textContent = `Error: ${error.message}`;
                scanMessage.className = 'mt-4 text-center text-red-600 font-medium';
            }
        });

        // --- Manual Add Wine Modal Logic ---
        const manualAddModal = document.getElementById('manualAddModal');
        const openManualAddModalBtn = document.getElementById('openManualAddModalBtn');
        const closeManualAddModalBtn = document.getElementById('closeManualAddModalBtn');
        const manualCancelBtn = document.getElementById('manualCancelBtn');
        const manualAddForm = document.getElementById('manualAddForm');
        const manualAddMessage = document.getElementById('manualAddMessage');

        openManualAddModalBtn.addEventListener('click', () => {
            manualAddModal.classList.remove('hidden');
            manualAddMessage.textContent = ''; // Clear previous message
        });

        const closeModal = () => {
            manualAddModal.classList.add('hidden');
            manualAddForm.reset(); // Reset the form fields
        };

        closeManualAddModalBtn.addEventListener('click', closeModal);
        manualCancelBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === manualAddModal) {
                closeModal();
            }
        });

        manualAddForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get values from the manual form
            const wineName = document.getElementById('manualNameInput').value;
            const varietal = document.getElementById('manualVarietalInput').value;
            const vintage = document.getElementById('manualVintageInput').value;
            const region = document.getElementById('manualRegionInput').value;
            const country = document.getElementById('manualCountryInput').value;
            const quantity = document.getElementById('manualQuantityInput').value;

            // Create a payload object
            const payload = {
                name: wineName,
                varietal: varietal || null, // Send null if empty
                vintage: vintage ? parseInt(vintage) : null,
                region: region || null, // Send null if empty
                country: country || null, // Send null if empty
                quantity: parseInt(quantity)
            };

            manualAddMessage.textContent = 'Adding wine manually, please wait...';
            manualAddMessage.className = 'mt-4 text-center text-gray-500';

            try {
                const response = await fetch('/api/add_manual_wine', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();

                if (response.ok) {
                    manualAddMessage.textContent = data.message;
                    manualAddMessage.className = 'mt-4 text-center text-green-600 font-medium';
                    fetchWineData(); // Refresh the table
                    setTimeout(closeModal, 2000); // Close the modal after a short delay
                } else {
                    throw new Error(data.error || 'An unknown error occurred.');
                }
            } catch (error) {
                console.error('Error adding wine manually:', error);
                manualAddMessage.textContent = `Error: ${error.message}`;
                manualAddMessage.className = 'mt-4 text-center text-red-600 font-medium';
            }
        });
        
        // Vivino Search Logic
        const vivinoSearchForm = document.getElementById('vivinoSearchForm');
        vivinoSearchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('vivinoSearchInput').value;
            if (query) {
                const vivinoSearchUrl = `https://www.vivino.com/search/wines?q=${encodeURIComponent(query)}`;
                window.open(vivinoSearchUrl, '_blank');
            }
        });


        // --- Actions on wines (Increment/Decrement/Delete) ---
        async function updateWineQuantity(wineId, newQuantity) {
            try {
                const response = await fetch(`/api/update_quantity`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ id: wineId, quantity: newQuantity }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'An unknown error occurred.');
                }
                fetchWineData(); // Refresh the table
            } catch (error) {
                console.error('Error updating wine quantity:', error);
                alert(`Failed to update wine quantity: ${error.message}`);
            }
        }

        function incrementQuantity(wineId) {
            const wine = wineData.find(w => w.id === wineId);
            if (wine) {
                updateWineQuantity(wineId, wine.quantity + 1);
            }
        }

        function decrementQuantity(wineId) {
            const wine = wineData.find(w => w.id === wineId);
            if (wine && wine.quantity > 0) {
                const newQuantity = wine.quantity - 1;
                if (newQuantity === 0) {
                    if (confirm('Quantity will be set to 0. Would you like to delete this wine from your inventory instead?')) {
                         deleteWine(wineId);
                    } else {
                        updateWineQuantity(wineId, newQuantity);
                    }
                } else {
                    updateWineQuantity(wineId, newQuantity);
                }
            }
        }

        async function deleteWine(wineId) {
            if (!confirm('Are you sure you want to permanently delete this wine? This action cannot be undone.')) {
                return;
            }
            try {
                const response = await fetch(`/api/delete_wine`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ id: wineId }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'An unknown error occurred.');
                }
                fetchWineData(); // Refresh the table
            } catch (error) {
                console.error('Error deleting wine:', error);
                alert(`Failed to delete wine: ${error.message}`);
            }
        }
        
        // --- Initial Data Load ---
        document.addEventListener('DOMContentLoaded', fetchWineData);
    </script>
</body>
</html>
