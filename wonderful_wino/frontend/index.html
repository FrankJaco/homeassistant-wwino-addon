<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonderful-Wino Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f5ed; --text-color: #333; --header-color: #4a0e4e;
            --accent-color: #6b21a8; --card-bg: white; --border-color: #e5e7eb;
            --button-primary-bg: #8b5cf6; --button-primary-hover-bg: #7c3aed;
            --button-secondary-bg: #e5e7eb; --button-secondary-text: #4b5563;
            --button-secondary-hover-bg: #d1d5db; --table-header-bg: #f9fafb;
            --input-bg: var(--card-bg); --input-text: var(--text-color); --input-border: var(--border-color);
        }
        .dark-theme {
            --bg-color: #2d3748; --text-color: #e2e8f0; --header-color: #b794f4;
            --accent-color: #9f7aea; --card-bg: #4a5568; --border-color: #6b7280;
            --button-primary-bg: #9f7aea; --button-primary-hover-bg: #b794f4;
            --button-secondary-bg: #6b7280; --button-secondary-text: #e2e8f0;
            --button-secondary-hover-bg: #718096; --table-header-bg: #4a5568;
            --input-bg: #2d3748; --input-text: #e2e8f0; --input-border: #6b7280;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s ease, color 0.3s ease; }
        .wine-details-cell h4 { font-weight: 600; margin-bottom: 0.25rem; color: var(--header-color); }
        .wine-details-cell p { margin: 0.25rem 0; line-height: 1.4; color: var(--text-color); }
        .wine-details-cell strong { font-weight: 700; color: var(--accent-color); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: var(--card-bg); color: var(--text-color); padding: 1.5rem; border-radius: 0.5rem; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-close-button { position: absolute; top: 0.75rem; right: 0.75rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-color); }
        /* PHASE 2: Added styles for new components */
        .cost-tier-selector span { cursor: pointer; padding: 0.5rem; border-radius: 0.25rem; border: 1px solid var(--border-color); transition: background-color 0.2s; }
        .cost-tier-selector span.selected { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
        .filter-button { padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 0.375rem; background-color: var(--button-secondary-bg); color: var(--button-secondary-text); font-weight: 500; transition: background-color 0.2s; }
        .filter-button.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8">

    <header class="text-center mb-8 px-4 w-full max-w-4xl flex justify-between items-center">
        <h1 class="text-4xl font-extrabold text-purple-800 tracking-tight">Wonderful Wino</h1>
    </header>

    <main class="w-full max-w-4xl px-4">
        <section class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-3xl font-semibold text-gray-800 mb-4">Add Wine</h2>
            <form id="scanWineForm" class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="vivinoUrlInput" placeholder="Paste Vivino URL here" class="flex-grow px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500" required>
                <div class="flex items-center gap-2">
                    <label for="quantityInput" class="font-medium whitespace-nowrap">Qty:</label>
                    <input type="number" id="quantityInput" placeholder="1" min="1" value="1" class="w-20 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-md hover:bg-purple-700">Add from URL</button>
            </form>
            <div class="mt-6 pt-6 border-t text-center">
                <button id="openEntryModalBtn" class="bg-gray-200 text-gray-600 font-semibold px-6 py-2 rounded-md hover:bg-gray-300">Manual Entry</button>
            </div>
            <div id="scanMessage" class="mt-4 text-center hidden"></div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md mb-8">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 sm:mb-4">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4 sm:mb-0">Wine Inventory</h2>
                <div id="inventory-filters" class="flex items-center gap-2">
                    <button id="filterOnHandsBtn" class="filter-button active" data-filter="on_hand">On Hand</button>
                    <button id="filterHistoryBtn" class="filter-button" data-filter="history">History</button>
                    <button id="filterAllBtn" class="filter-button" data-filter="all">All</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <tbody id="inventoryTableBody"></tbody>
                </table>
            </div>
            <div id="inventoryMessage" class="mt-4 text-center hidden"></div>
        </section>
        
    </main>

    <div id="entryModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close-button" onclick="closeEntryModal()">&times;</button>
            <h3 id="entryModalTitle" class="text-xl font-semibold mb-4">Add Wine Manually</h3>
            <form id="entryForm">
                <input type="hidden" id="entryVivinoUrl">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="sm:col-span-2"><label class="block text-sm font-medium">Wine Name *</label><input type="text" id="manualNameInput" class="mt-1 block w-full border rounded-md p-2" required></div>
                    <div><label class="block text-sm font-medium">Vintage *</label><input type="number" id="manualVintageInput" class="mt-1 block w-full border rounded-md p-2" required></div>
                    <div><label class="block text-sm font-medium">Varietal</label><input type="text" id="manualVarietalInput" class="mt-1 block w-full border rounded-md p-2"></div>
                    <div><label class="block text-sm font-medium">Region</label><input type="text" id="manualRegionInput" class="mt-1 block w-full border rounded-md p-2"></div>
                    <div><label class="block text-sm font-medium">Country</label><input type="text" id="manualCountryInput" class="mt-1 block w-full border rounded-md p-2"></div>
                    <div class="sm:col-span-2"><label class="block text-sm font-medium">Quantity *</label><input type="number" id="manualQuantityInput" min="0" value="1" class="mt-1 block w-full border rounded-md p-2" required></div>
                    
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium">Cost Tier</label>
                        <div id="costTierSelector" class="flex items-center gap-2 mt-1 cost-tier-selector">
                            <span data-value="1">$</span><span data-value="2">$$</span>
                            <span data-value="3">$$$</span><span data-value="4">$$$$</span><span data-value="5">$$$$$</span>
                        </div>
                        <input type="hidden" id="manualCostTierInput">
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-4">
                    <button type="button" onclick="closeEntryModal()" class="bg-gray-200 text-gray-600 px-6 py-2 rounded-md hover:bg-gray-300">Cancel</button>
                    <button type="submit" id="entrySubmitBtn" class="bg-purple-600 text-white px-6 py-2 rounded-md hover:bg-purple-700">Add Wine</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentInventory = [];
        let currentFilter = 'on_hand';

        function showMessage(elementId, message, type = 'info') {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = `mt-4 text-center p-2 rounded-md ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        async function fetchInventory() {
            document.getElementById('inventoryTableBody').innerHTML = '<tr><td class="p-4 text-center text-gray-500">Loading inventory...</td></tr>';
            try {
                const response = await fetch(`/inventory?filter=${currentFilter}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                currentInventory = await response.json();
                displayInventory(currentInventory);
            } catch (error) {
                showMessage('inventoryMessage', `Failed to load inventory: ${error.message}`, 'error');
            }
        }

        function displayInventory(inventory) {
            const container = document.getElementById('inventoryTableBody');
            container.innerHTML = '';
            if (inventory.length === 0) {
                container.innerHTML = `<tr><td class="p-4 text-center text-gray-500">No wines found for filter: ${currentFilter.replace('_', ' ')}</td></tr>`;
                return;
            }
            inventory.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'border-b flex flex-col sm:table-row';

                const cell = document.createElement('td');
                cell.className = 'p-4 flex flex-col sm:flex-row sm:items-center gap-4';

                const imageHtml = item.image_url ? `<img src="${item.image_url}" class="h-24 w-24 object-cover rounded-md mx-auto sm:mx-0">` : '<div class="w-24 h-24 flex items-center justify-center bg-gray-100 rounded-md text-gray-400">No Image</div>';
                
                let detailsHtml = `<div class="wine-details-cell text-center sm:text-left flex-grow"><h4>${item.name || 'N/A'} ${item.vintage ? `(${item.vintage})` : ''}</h4>`;
                if(item.varietal && item.varietal !== "Unknown Varietal") detailsHtml += `<p>${item.varietal}</p>`;
                
                let location = [item.region, item.country].filter(Boolean).filter(loc => !loc.startsWith("Unknown")).join(', ');
                if(location) detailsHtml += `<p>${location}</p>`;

                let ratingLine = [];
                let displayRating = item.vivino_rating;
                if(item.personal_rating !== null && item.vivino_rating !== null) {
                    displayRating = (item.personal_rating + item.vivino_rating) / 2;
                } else if (item.personal_rating !== null) {
                    displayRating = item.personal_rating;
                }

                if(displayRating !== null) ratingLine.push(`<strong>Quality:</strong> ⭐ ${displayRating.toFixed(1)}`);
                if(item.cost_tier) ratingLine.push(`<strong>Cost:</strong> ${'$'.repeat(item.cost_tier)}`);

                if(ratingLine.length > 0) detailsHtml += `<p class="mt-2">${ratingLine.join(' | ')}</p>`;
                detailsHtml += '</div>';

                const actionsHtml = `
                    <div class="flex flex-row justify-center items-center gap-2 sm:w-auto">
                        <button onclick="consumeWine('${item.vivino_url}')" title="Consume 1" class="text-2xl">🍷</button>
                        <input type="number" value="${item.quantity}" min="0" onblur="setWineQuantity('${item.vivino_url}', this.value)" class="w-16 text-center border rounded-md p-1">
                        <button onclick="openEditModal(currentInventory.find(w => w.vivino_url === '${item.vivino_url}'))" title="Edit" class="text-2xl">✏️</button>
                        <button onclick="deleteWine('${item.vivino_url}')" title="Delete" class="text-2xl">🗑️</button>
                    </div>`;

                cell.innerHTML = `${imageHtml}${detailsHtml}${actionsHtml}`;
                row.appendChild(cell);
                container.appendChild(row);
            });
        }
        
        document.getElementById('scanWineForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const payload = {
                vivino_url: document.getElementById('vivinoUrlInput').value,
                quantity: parseInt(document.getElementById('quantityInput').value, 10),
                cost_tier: null // Can be enhanced later to add cost on initial scan
            };
            try {
                const response = await fetch('/scan-wine', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.message);
                showMessage('scanMessage', result.message);
                this.reset();
                fetchInventory();
            } catch (error) {
                showMessage('scanMessage', `Error: ${error.message}`, 'error');
            }
        });

        document.getElementById('entryForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const vivinoUrl = document.getElementById('entryVivinoUrl').value;
            const isEditMode = !!vivinoUrl;
            
            const payload = {
                name: document.getElementById('manualNameInput').value,
                vintage: parseInt(document.getElementById('manualVintageInput').value, 10),
                varietal: document.getElementById('manualVarietalInput').value,
                region: document.getElementById('manualRegionInput').value,
                country: document.getElementById('manualCountryInput').value,
                quantity: parseInt(document.getElementById('manualQuantityInput').value, 10),
                cost_tier: parseInt(document.getElementById('manualCostTierInput').value, 10) || null,
            };

            let url = isEditMode ? '/edit-wine' : '/add-manual-wine';
            if(isEditMode) payload.vivino_url = vivinoUrl;

            try {
                const response = await fetch(url, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.message);
                showMessage('inventoryMessage', result.message);
                closeEntryModal();
                fetchInventory();
            } catch (error) {
                showMessage('inventoryMessage', `Error: ${error.message}`, 'error');
            }
        });

        async function consumeWine(vivinoUrl) {
            if (!confirm('Consume one unit of this wine?')) return;
            await fetch('/inventory/wine/consume', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ vivino_url: vivinoUrl })
            });
            fetchInventory();
        }
        
        async function setWineQuantity(vivinoUrl, newQuantity) {
            // Placeholder: Full quantity update is handled via Edit Modal
        }

        async function deleteWine(vivinoUrl) {
            if (!confirm('Permanently delete this wine?')) return;
            await fetch('/inventory/wine', {
                method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ vivino_url: vivinoUrl })
            });
            fetchInventory();
        }

        // Modal Controls
        const entryModal = document.getElementById('entryModal');
        document.getElementById('openEntryModalBtn').addEventListener('click', () => openAddModal());
        function closeEntryModal() { entryModal.classList.add('hidden'); }
        
        function openAddModal() {
            document.getElementById('entryForm').reset();
            document.getElementById('entryVivinoUrl').value = '';
            document.getElementById('entryModalTitle').textContent = 'Add Wine Manually';
            document.getElementById('entrySubmitBtn').textContent = 'Add Wine';
            updateCostTierSelector(null);
            entryModal.classList.remove('hidden');
        }

        function openEditModal(wine) {
            document.getElementById('entryVivinoUrl').value = wine.vivino_url;
            document.getElementById('manualNameInput').value = wine.name;
            document.getElementById('manualVintageInput').value = wine.vintage;
            document.getElementById('manualVarietalInput').value = wine.varietal !== 'Unknown Varietal' ? wine.varietal : '';
            document.getElementById('manualRegionInput').value = wine.region !== 'Unknown Region' ? wine.region : '';
            document.getElementById('manualCountryInput').value = wine.country !== 'Unknown Country' ? wine.country : '';
            document.getElementById('manualQuantityInput').value = wine.quantity;
            updateCostTierSelector(wine.cost_tier);
            document.getElementById('entryModalTitle').textContent = 'Edit Wine';
            document.getElementById('entrySubmitBtn').textContent = 'Save Changes';
            entryModal.classList.remove('hidden');
        }

        const costTierSelector = document.getElementById('costTierSelector');
        const costTierInput = document.getElementById('manualCostTierInput');
        costTierSelector.addEventListener('click', (e) => {
            if (e.target.matches('span')) {
                const value = e.target.dataset.value;
                costTierInput.value = (costTierInput.value === value) ? '' : value;
                updateCostTierSelector(costTierInput.value);
            }
        });

        function updateCostTierSelector(selectedValue) {
            costTierInput.value = selectedValue || '';
            costTierSelector.querySelectorAll('span').forEach(span => {
                span.classList.toggle('selected', span.dataset.value == selectedValue);
            });
        }
        
        const filterContainer = document.getElementById('inventory-filters');
        filterContainer.addEventListener('click', (e) => {
            if (e.target.matches('.filter-button')) {
                currentFilter = e.target.dataset.filter;
                filterContainer.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                fetchInventory();
            }
        });

        document.addEventListener('DOMContentLoaded', fetchInventory);
    </script>
</body>
</html>
